<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://i-field.github.io/">
    <title>iField | Главный профиль</title>
    <link rel="canonical" href="https://i-field.github.io/">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            color: white;
        }
        a {
            color: #ffd966;
            text-decoration: none;
        }
        .loader {
            margin-top: 20px;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 iField | Главный профиль</h2>
        <p>Перенаправление на <a href="https://i-field.github.io/">i-field.github.io</a>...</p>
        <div class="loader"></div>
    </div>
    <script>
        window.location.href = "https://i-field.github.io/";
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iField | Центральный каталог лендингов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .stats-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stats {
            color: white;
            font-weight: 600;
        }

        .search-box {
            flex: 1;
            max-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 40px;
            font-size: 0.9rem;
            outline: none;
        }

        .refresh-btn {
            background: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(0.98);
            background: #f0f0f0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
            color: white;
        }

        .card-header h3 {
            font-size: 1.2rem;
            margin-bottom: 0.3rem;
            word-break: break-word;
        }

        .project-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 0.3rem;
        }

        .card-body {
            padding: 1rem;
        }

        .url {
            background: #f5f5f5;
            padding: 0.5rem;
            border-radius: 10px;
            font-size: 0.7rem;
            font-family: monospace;
            word-break: break-all;
            margin-bottom: 1rem;
            color: #666;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            flex: 1;
            justify-content: center;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 20px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .grid { grid-template-columns: 1fr; }
            .stats-bar { flex-direction: column; align-items: stretch; }
            .search-box { max-width: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 iField | Центральный каталог</h1>
        <div class="sub">Все лендинги и проекты в одном месте</div>
    </div>

    <div class="stats-bar">
        <div class="stats" id="statsCounter">⏳ Загрузка...</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию или проекту...">
        </div>
        <button class="refresh-btn" id="refreshBtn">🔄 Обновить каталог</button>
    </div>

    <div id="landingsGrid">
        <div class="loading">⏳ Загрузка всех лендингов...</div>
    </div>

    <footer>
        💡 Каталог автоматически собирает все лендинги из ваших проектов<br>
        Данные сохраняются в браузере для быстрого доступа
    </footer>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ - ВСЕ ВАШИ РЕПОЗИТОРИИ ==========
    // Добавьте сюда все ваши проекты/лендинги
    const PROJECTS = [
        {
            name: "🏠 Main Landing",
            url: "https://i-field.github.io/-iField-Landing-Catalog-/",
            files: [
                "index.html",
                "main.html"
            ]
        },
        {
            name: "💬 Chat iField",
            url: "https://i-field.github.io/Chat-iField/",
            files: ["index.html"]
        },
        {
            name: "⚡ Generator Landing iField Pro",
            url: "https://i-field.github.io/Generator-Landing-ifield-Pro/",
            files: ["index.html"]
        },
        {
            name: "🔐 Cipher P2P iField",
            url: "https://i-field.github.io/cipher-p2p-iField/",
            files: ["index.html"]
        },
        {
            name: "🎨 iField Generator Landing",
            url: "https://i-field.github.io/iField-Generator-Landing/",
            files: ["index.html"]
        },
        {
            name: "🤖 iField Chat",
            url: "https://i-field.github.io/iField-chat/",
            files: ["index.html"]
        }
    ];

    // Дополнительные лендинги (если есть в папке Files)
    const EXTRA_LANDINGS = [
        { name: "8 main", url: "https://i-field.github.io/-iField-Landing-Catalog-/Files/8%20main.html" },
        { name: "Q Go to file", url: "https://i-field.github.io/-iField-Landing-Catalog-/Files/Q%20Go%20to%20file.html" },
        { name: "README", url: "https://i-field.github.io/-iField-Landing-Catalog-/README.md" }
    ];

    const STORAGE_KEY = 'ifield_central_catalog';
    
    let allLandings = [];
    
    // DOM элементы
    const gridContainer = document.getElementById('landingsGrid');
    const searchInput = document.getElementById('searchInput');
    const statsSpan = document.getElementById('statsCounter');
    const refreshBtn = document.getElementById('refreshBtn');
    
    // Собрать все лендинги из проектов
    function collectAllLandings() {
        const landings = [];
        
        // Добавляем из основных проектов
        for (const project of PROJECTS) {
            for (const file of project.files) {
                let url = project.url;
                if (!url.endsWith('/')) url += '/';
                url += file;
                
                landings.push({
                    name: file === 'index.html' ? project.name : `${project.name} / ${file}`,
                    fileName: file,
                    project: project.name,
                    url: url,
                    type: 'project'
                });
            }
        }
        
        // Добавляем дополнительные лендинги из Files
        for (const extra of EXTRA_LANDINGS) {
            landings.push({
                name: extra.name,
                fileName: extra.name,
                project: '📁 Дополнительные лендинги',
                url: extra.url,
                type: 'extra'
            });
        }
        
        return landings;
    }
    
    // Сохранить в localStorage
    function saveLandings(landings) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(landings));
    }
    
    // Загрузить из localStorage
    function loadSavedLandings() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                return JSON.parse(saved);
            } catch(e) {
                return null;
            }
        }
        return null;
    }
    
    // Проверить доступность лендинга
    async function checkLanding(url) {
        try {
            const response = await fetch(url, { method: 'HEAD', mode: 'no-cors' });
            return true;
        } catch(e) {
            return false;
        }
    }
    
    // Форматировать название для отображения
    function formatDisplayName(landing) {
        if (landing.name) return landing.name;
        let name = landing.fileName.replace(/\.html$/i, '');
        name = name.replace(/[-_]/g, ' ');
        name = name.replace(/\b\w/g, l => l.toUpperCase());
        return name;
    }
    
    // Рендер сетки
    function renderLandings() {
        const searchTerm = searchInput.value.toLowerCase().trim();
        let filtered = allLandings;
        
        if (searchTerm) {
            filtered = allLandings.filter(land => 
                land.name.toLowerCase().includes(searchTerm) || 
                land.project.toLowerCase().includes(searchTerm) ||
                land.fileName.toLowerCase().includes(searchTerm)
            );
        }
        
        statsSpan.textContent = `${filtered.length} / ${allLandings.length} лендингов`;
        
        if (filtered.length === 0) {
            gridContainer.innerHTML = `
                <div class="empty-state">
                    🔍 Ничего не найдено<br>
                    <small>Попробуйте другой поисковый запрос</small>
                </div>
            `;
            return;
        }
        
        let html = '<div class="grid">';
        for (const land of filtered) {
            const displayName = formatDisplayName(land);
            
            html += `
                <div class="card">
                    <div class="card-header">
                        <h3>${escapeHtml(displayName)}</h3>
                        <div class="project-badge">📁 ${escapeHtml(land.project)}</div>
                    </div>
                    <div class="card-body">
                        <div class="url">🔗 ${escapeHtml(land.url)}</div>
                        <div class="card-actions">
                            <a href="${escapeHtml(land.url)}" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
                                🚀 Открыть
                            </a>
                            <button class="btn btn-secondary" onclick="copyToClipboard('${escapeHtml(land.url)}', this)">
                                📋 Копировать
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        html += '</div>';
        gridContainer.innerHTML = html;
    }
    
    // Копирование
    function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = '✅ Готово!';
            setTimeout(() => {
                btn.innerText = originalText;
            }, 1500);
        }).catch(() => {
            alert('Не удалось скопировать');
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Обновить каталог
    function refreshCatalog() {
        gridContainer.innerHTML = '<div class="loading">🔄 Обновление каталога...</div>';
        
        // Собираем все лендинги
        allLandings = collectAllLandings();
        
        // Сохраняем
        saveLandings(allLandings);
        
        // Рендерим
        setTimeout(() => {
            renderLandings();
        }, 500);
    }
    
    // Инициализация
    function init() {
        // Пробуем загрузить сохраненные
        const saved = loadSavedLandings();
        if (saved && saved.length > 0) {
            allLandings = saved;
            renderLandings();
        } else {
            refreshCatalog();
        }
        
        searchInput.addEventListener('input', renderLandings);
        refreshBtn.addEventListener('click', refreshCatalog);
    }
    
    window.copyToClipboard = copyToClipboard;
    init();
</script>
</body>
</html>

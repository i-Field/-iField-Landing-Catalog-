    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iField | Автокаталог лендингов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .sub {
            color: rgba(255,255,255,0.9);
        }

        .status {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }

        .search-box {
            background: white;
            border-radius: 60px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
        }

        .stats {
            background: white;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            color: white;
        }

        .card-header h3 {
            font-size: 1rem;
            word-break: break-word;
        }

        .folder {
            font-size: 0.7rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .card-body {
            padding: 15px;
        }

        .url {
            background: #f5f5f5;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-family: monospace;
            word-break: break-all;
            margin-bottom: 15px;
            color: #666;
        }

        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }

        .btn:hover {
            background: #5a67d8;
        }

        .empty {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            color: #666;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 0.75rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📁 iField | Автокаталог</h1>
        <div class="sub">Все HTML файлы из репозитория автоматически</div>
    </div>

    <div class="status" id="status">
        🔍 Сканирую репозиторий...
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Поиск по названию...">
    </div>

    <div style="text-align: center;">
        <span class="stats" id="statsCounter">0 лендингов</span>
    </div>

    <div id="content">
        <div class="loading">⏳ Загрузка...</div>
    </div>

    <footer>
        💡 Просто добавь любой HTML файл в репозиторий — он автоматически появится здесь<br>
        Данные обновляются при загрузке страницы
    </footer>
</div>

<script>
    // ========== НАСТРОЙКИ - ИЗМЕНИ ПОД СЕБЯ ==========
    const REPO_OWNER = 'i-field';           // Твой логин на GitHub
    const REPO_NAME = '-iField-Landing-Catalog-';  // Название репозитория
    const BRANCH = 'main';                   // Ветка (main или master)
    
    // ========== КОД АВТОМАТИЧЕСКОГО ПОИСКА ==========
    let allFiles = [];
    
    const content = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');
    const statsCounter = document.getElementById('statsCounter');
    const statusDiv = document.getElementById('status');
    
    // Получить все файлы из репозитория
    async function loadFiles() {
        try {
            statusDiv.innerHTML = '📡 Подключаюсь к GitHub API...';
            
            // Запрос к GitHub API для получения всех файлов
            const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/${BRANCH}?recursive=1`;
            const response = await fetch(apiUrl);
            
            if (!response.ok) {
                throw new Error(`Ошибка ${response.status}: репозиторий может быть приватным`);
            }
            
            const data = await response.json();
            
            if (!data.tree) {
                throw new Error('Не удалось получить список файлов');
            }
            
            // Фильтруем только HTML файлы
            const htmlFiles = data.tree.filter(file => {
                return file.type === 'blob' && file.path.toLowerCase().endsWith('.html');
            });
            
            allFiles = htmlFiles;
            
            if (allFiles.length === 0) {
                statusDiv.innerHTML = '⚠️ HTML файлы не найдены. Добавьте хотя бы один .html файл в репозиторий';
                content.innerHTML = `
                    <div class="empty">
                        📭 Нет HTML файлов<br><br>
                        <small>Добавьте любой .html файл в репозиторий, и он появится здесь автоматически</small>
                    </div>
                `;
                statsCounter.textContent = `0 / 0`;
                return;
            }
            
            statusDiv.innerHTML = `✅ Найдено ${allFiles.length} HTML файлов`;
            renderFiles();
            
        } catch (error) {
            console.error('Ошибка:', error);
            statusDiv.innerHTML = `❌ Ошибка: ${error.message}`;
            content.innerHTML = `
                <div class="empty">
                    ⚠️ Не удалось загрузить файлы<br><br>
                    <strong>Возможные причины:</strong><br>
                    • Репозиторий приватный — сделайте его публичным<br>
                    • Неправильное имя репозитория<br>
                    • Проблемы с GitHub API<br><br>
                    <small>Текущие настройки: ${REPO_OWNER}/${REPO_NAME}</small>
                </div>
            `;
        }
    }
    
    // Форматировать имя для отображения
    function formatName(filename) {
        let name = filename.replace(/\.html$/i, '');
        name = name.replace(/[-_]/g, ' ');
        name = name.replace(/\b\w/g, l => l.toUpperCase());
        return name || 'Лендинг';
    }
    
    // Получить путь к папке
    function getFolder(path) {
        if (path.includes('/')) {
            return path.substring(0, path.lastIndexOf('/'));
        }
        return 'Корень';
    }
    
    // Рендер списка файлов
    function renderFiles() {
        const searchTerm = searchInput.value.toLowerCase().trim();
        let filtered = allFiles;
        
        if (searchTerm) {
            filtered = allFiles.filter(file => 
                file.path.toLowerCase().includes(searchTerm) ||
                formatName(file.path.split('/').pop()).toLowerCase().includes(searchTerm)
            );
        }
        
        statsCounter.textContent = `${filtered.length} / ${allFiles.length}`;
        
        if (filtered.length === 0) {
            content.innerHTML = '<div class="empty">🔍 Ничего не найдено</div>';
            return;
        }
        
        let html = '<div class="grid">';
        
        for (const file of filtered) {
            const fileName = file.path.split('/').pop();
            const displayName = formatName(fileName);
            const folder = getFolder(file.path);
            const fileUrl = `https://${REPO_OWNER}.github.io/${REPO_NAME}/${file.path}`;
            
            html += `
                <div class="card">
                    <div class="card-header">
                        <h3>📄 ${escapeHtml(displayName)}</h3>
                        <div class="folder">📁 ${escapeHtml(folder)}</div>
                    </div>
                    <div class="card-body">
                        <div class="url">🔗 ${escapeHtml(fileUrl)}</div>
                        <a href="${escapeHtml(fileUrl)}" class="btn" target="_blank">🚀 Открыть лендинг</a>
                    </div>
                </div>
            `;
        }
        
        html += '</div>';
        content.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Поиск в реальном времени
    searchInput.addEventListener('input', renderFiles);
    
    // Запуск
    loadFiles();
</script>
</body>
</html>

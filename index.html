<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>iField | Автокаталог лендингов</title>
    
    <!-- МЕТА-ТЕГИ ДЛЯ ПРЕВЬЮ -->
    <meta property="og:title" content="iField | Центральный каталог лендингов">
    <meta property="og:description" content="🚀 Все проекты iField в одном месте. Автоматический каталог HTML файлов.">
    <meta property="og:image" content="https://i-field.github.io/-iField-Landing-Catalog-/preview.png">
    <meta property="og:url" content="https://i-field.github.io/-iField-Landing-Catalog-/">
    <meta property="og:type" content="website">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: white; font-size: 2rem; margin-bottom: 10px; }
        .sub { text-align: center; color: rgba(255,255,255,0.9); margin-bottom: 20px; font-size: 0.9rem; }
        .status {
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            padding: 10px 20px;
            text-align: center;
            margin-bottom: 20px;
            color: white;
            font-size: 0.85rem;
        }
        .search-box { margin-bottom: 20px; text-align: center; }
        .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            text-align: center;
        }
        .stats { text-align: center; color: white; margin-bottom: 20px; font-weight: bold; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .card:hover { transform: translateY(-5px); }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            color: white;
        }
        .card-header h3 { font-size: 1rem; word-break: break-word; }
        .card-folder {
            font-size: 0.65rem;
            opacity: 0.8;
            margin-top: 5px;
            font-family: monospace;
        }
        .card-body { padding: 15px; }
        .card-url {
            background: #f5f5f5;
            padding: 8px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-family: monospace;
            word-break: break-all;
            margin-bottom: 15px;
            color: #666;
        }
        .btn {
            display: inline-block;
            width: 100%;
            text-align: center;
            background: #667eea;
            color: white;
            padding: 10px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn:hover { background: #5a67d8; }
        .loading, .error {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            color: #666;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 iField | Автокаталог</h1>
    <div class="sub">Все HTML файлы из репозитория — автоматически</div>
    
    <div class="status" id="status">🔍 Сканирую репозиторий...</div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Поиск лендинга...">
    </div>
    
    <div class="stats" id="statsCounter">0 лендингов</div>
    
    <div id="landingsGrid" class="grid">
        <div class="loading">⏳ Загрузка...</div>
    </div>
    
    <footer>💡 Просто добавь любой .html файл в репозиторий — он появится здесь автоматически</footer>
</div>

<script>
    // НАСТРОЙКИ (измени если нужно)
    const REPO_OWNER = 'i-field';
    const REPO_NAME = '-iField-Landing-Catalog-';
    const BRANCH = 'main';
    
    const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/${BRANCH}?recursive=1`;
    const BASE_URL = `https://${REPO_OWNER}.github.io/${REPO_NAME}`;
    
    let allFiles = [];
    let isLoading = false;
    
    const grid = document.getElementById('landingsGrid');
    const searchInput = document.getElementById('searchInput');
    const statsSpan = document.getElementById('statsCounter');
    const statusDiv = document.getElementById('status');
    
    async function scanRepository() {
        if (isLoading) return;
        isLoading = true;
        statusDiv.innerHTML = '📡 Подключаюсь к GitHub API...';
        
        try {
            const response = await fetch(API_URL);
            
            if (!response.ok) {
                throw new Error(`Ошибка ${response.status}: репозиторий может быть приватным`);
            }
            
            const data = await response.json();
            
            if (!data.tree) {
                throw new Error('Не удалось получить список файлов');
            }
            
            // Находим все HTML файлы
            const htmlFiles = data.tree.filter(file => {
                return file.type === 'blob' && file.path.toLowerCase().endsWith('.html');
            });
            
            allFiles = htmlFiles.map(file => ({
                name: file.path.split('/').pop(),
                path: file.path,
                folder: file.path.includes('/') ? file.path.substring(0, file.path.lastIndexOf('/')) : 'Корень',
                url: `${BASE_URL}/${file.path}`,
                size: file.size
            }));
            
            // Сортируем по имени
            allFiles.sort((a, b) => a.name.localeCompare(b.name));
            
            if (allFiles.length === 0) {
                statusDiv.innerHTML = '⚠️ HTML файлы не найдены. Добавьте .html файлы в репозиторий';
                grid.innerHTML = '<div class="error">📭 Нет HTML файлов<br><small>Добавьте любой .html файл в репозиторий</small></div>';
                statsSpan.textContent = `0 / 0`;
            } else {
                statusDiv.innerHTML = `✅ Найдено ${allFiles.length} HTML файлов`;
                render();
            }
            
        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = `❌ Ошибка: ${error.message}`;
            grid.innerHTML = `<div class="error">⚠️ Не удалось загрузить файлы<br><br><small>Убедитесь что репозиторий публичный</small></div>`;
        } finally {
            isLoading = false;
        }
    }
    
    function formatName(filename) {
        let name = filename.replace(/\.html$/i, '');
        name = name.replace(/[-_]/g, ' ');
        name = name.replace(/\b\w/g, l => l.toUpperCase());
        return name || 'Лендинг';
    }
    
    function render() {
        const searchTerm = searchInput.value.toLowerCase().trim();
        let filtered = allFiles;
        
        if (searchTerm) {
            filtered = allFiles.filter(file => 
                file.name.toLowerCase().includes(searchTerm) || 
                formatName(file.name).toLowerCase().includes(searchTerm) ||
                file.folder.toLowerCase().includes(searchTerm)
            );
        }
        
        statsSpan.textContent = `${filtered.length} / ${allFiles.length}`;
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="error">🔍 Ничего не найдено</div>';
            return;
        }
        
        let html = '<div class="grid">';
        for (const file of filtered) {
            const displayName = formatName(file.name);
            
            html += `
                <div class="card">
                    <div class="card-header">
                        <h3>📄 ${escapeHtml(displayName)}</h3>
                        <div class="card-folder">📁 ${escapeHtml(file.folder)}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-url">🔗 ${escapeHtml(file.url)}</div>
                        <a href="${escapeHtml(file.url)}" class="btn" target="_blank">🚀 Открыть</a>
                    </div>
                </div>
            `;
        }
        html += '</div>';
        grid.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    searchInput.addEventListener('input', render);
    
    // ЗАПУСК
    scanRepository();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iField Landing Catalog</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

h1 {
  text-align:center;
  margin-bottom:40px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  transition:0.3s;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  border-radius:8px;
  margin-bottom:10px;
}

.card h3 {
  margin-bottom:10px;
}

.btn {
  display:block;
  text-align:center;
  padding:10px;
  background:#3b82f6;
  color:white;
  border-radius:6px;
  text-decoration:none;
}

.btn:hover {
  background:#2563eb;
}

.hero {
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.hero h1 {
  font-size:36px;
}

.hero p {
  opacity:0.8;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>🚀 iField Landing Catalog</h1>
  <p>All your landing pages in one place</p>
</section>

<!-- CATALOG -->
<div class="container">
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300x180">
      <h3>Chat iField</h3>
      <a href="Chat-iField/index.html" target="_blank" class="btn">Open</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x180">
      <h3>Generator Landing Pro</h3>
      <a href="generator-landing-pro/index.html" target="_blank" class="btn">Open</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x180">
      <h3>Cipher P2P</h3>
      <a href="cipher-p2p/index.html" target="_blank" class="btn">Open</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x180">
      <h3>iField Generator</h3>
      <a href="ifield-generator/index.html" target="_blank" class="btn">Open</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x180">
      <h3>iField Chat</h3>
      <a href="ifield-chat/index.html" target="_blank" class="btn">Open</a>
    </div>

  </div>
</div>

</body>
</html>
